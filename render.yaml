services:
  - type: web
    name: arcadia-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ARCADIA_MODE
        value: local
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_FRONTEND_URL
        sync: false
      - key: AUTH_REQUIRE_EMAIL_VERIFICATION
        value: true
