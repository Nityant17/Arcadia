name: arcadia_app
description: Arcadia — Multimodal Adaptive Mastery Engine

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.4+3
  fl_chart: ^0.69.2
  
  # Networking
  http: ^1.2.2
  
  # File picking
  file_picker: ^8.1.6
  
  # Audio playback
  audioplayers: ^6.1.0
  
  # State management
  provider: ^6.1.2
  
  # Image
  image_picker: ^1.1.2
  
  # Storage
  shared_preferences: ^2.3.4
  
  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  flutter_widget_from_html: ^0.15.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
